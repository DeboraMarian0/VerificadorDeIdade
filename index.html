<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    
    <title>Verificação de idade</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>

    </header>

    <main>
        <section class="container">
            <h1>Verificador de Idade</h1>
            <div class="formulario">
                <div class="nasc">
                    <label for="nasc">Ano de Nascimento: </label>
                    <input type="number" name="" id="nasc">
                </div>
            
                <div class="sexo">
                    <span>Sexo: </span>
                
                    <input type="radio" name="sexo" id="masc" value="M">
                    <label for="masc">Masculino</label>
                    
                    <input type="radio" name="sexo" id="fem" value="F">
                    <label for="fem">Feminino</label>
                </div>
            
                <div class="button">
                    <input type="button" id="botao" onclick="verificar()" value = "Verificar">
                </div>

                <div class= "resp">
                    <p id="verif">Preencha os dados acima para ver o resultado!</p>
                    
                    <div id="img"></div>
                </div>
            </div>
            
        </section>
    </main>

    <footer>
        <span>&copy; CursoEmVídeo</span>
    </footer>

    <script src="js/script.js" defer></script>
</body>
</html>
